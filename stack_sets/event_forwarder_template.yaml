# ============================================================================
# Cross-Account Event Forwarder Template
# ============================================================================
# This CloudFormation template is deployed to SOURCE accounts that should
# forward CloudWatch Alarm state changes to the central monitoring account.
#
# DEPLOYMENT:
#   Option 1 (Manual): Use create_stackset.sh to generate the template with
#   your specific ARNs, then deploy via CloudFormation.
#
#   Option 2 (Recommended): Deploy via AWS CloudFormation StackSets from
#   the management account to automatically roll out across the organization.
#   This can be integrated into the CDK deployment pipeline as a future
#   improvement using cdk-stacksets or aws-cdk-lib/aws-cloudformation.
#
# REQUIRED REPLACEMENTS:
#   - REPLACE_WITH_CENTRAL_BUS_ARN: The ARN of the custom EventBus in the
#     monitoring account (from stack output: CustomEventBusArn)
#   - REPLACE_WITH_LAMBDA_ROLE_ARN: The ARN of the DDB handler Lambda role
#     in the monitoring account (from stack output: CustomDynamoDBFunctionRoleArn)
# ============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cross-account alarm event forwarder for central alarm dashboard'

Resources:

  CentralEventBusForwardingRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              Service: 'events.amazonaws.com'
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: 'AllowSendEventsToCentralBusPolicy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: 'Allow'
                Action: 'events:PutEvents'
                Resource: 'REPLACE_WITH_CENTRAL_BUS_ARN'

  AlarmStateChangeEventRule:
    Type: 'AWS::Events::Rule'
    Properties:
      Description: 'Forwards CloudWatch Alarm State Change events to central monitoring account'
      EventPattern:
        source:
          - 'aws.cloudwatch'
        detail-type:
          - 'CloudWatch Alarm State Change'
      State: 'ENABLED'
      Targets:
        - Arn: 'REPLACE_WITH_CENTRAL_BUS_ARN'
          Id: 'CentralBusTarget'
          RoleArn: !GetAtt [ CentralEventBusForwardingRole, Arn ]

  CrossAccountAugmentationAssumeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Statement:
          - Action: sts:AssumeRole
            Effect: Allow
            Principal:
              AWS: 'REPLACE_WITH_LAMBDA_ROLE_ARN'
        Version: "2012-10-17"
      Description: Role assumed by central Alarm augmentation Lambda to read alarm/instance data
      RoleName: !Sub "CrossAccountAlarmAugmentationAssumeRole-${AWS::Region}"

  CrossAccountAugmentationAssumeRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyDocument:
        Statement:
          - Action: cloudwatch:ListTagsForResource
            Effect: Allow
            Resource: !Sub "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:*"
          - Action: ec2:DescribeInstances
            Effect: Allow
            Resource: "*"
          - Action:
              - account:GetAlternateContact
              - account:GetContactInformation
            Effect: Allow
            Resource: "*"
          - Action: organizations:DescribeAccount
            Effect: Allow
            Resource: "*"
        Version: "2012-10-17"
      PolicyName: CrossAccountAugmentationPolicy
      Roles:
        - Ref: CrossAccountAugmentationAssumeRole

Outputs:
  CentralEventBusForwardingRoleArn:
    Description: 'ARN of the IAM Role for EventBridge forwarding'
    Value: !GetAtt [ CentralEventBusForwardingRole, Arn ]

  AlarmStateChangeEventRuleName:
    Description: 'Name of the EventBridge rule for alarm state changes'
    Value: !Ref AlarmStateChangeEventRule

  CrossAccountRoleName:
    Description: 'Name of the cross-account augmentation role'
    Value: !Ref CrossAccountAugmentationAssumeRole
